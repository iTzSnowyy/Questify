<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Questify - Login / Register</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <div class="logo logo-flex">
      <img src="assets/logo.png" alt="Questify Logo" class="logo-img">
      <span>Questify</span>
    </div>
    <div id="user-info">
      <span id="user-email"></span>
      <button id="logout-btn" class="btn small">Logout</button>
    </div>
  </header>

  <nav class="nav">
    <a href="index.html">Auth</a>
    <a href="home.html">Home</a>
    <a href="character.html">Character</a>
    <a href="shop.html">Shop</a>
    <a href="workouts.html">Workouts</a>
    <a href="bosses.html">Bosses</a>
    <a href="analytics.html">Analytics</a>
  </nav>

  <main>
    <h2>Login / Register</h2>

    <div class="card">
      <h3>Register</h3>
      <input id="reg-email" type="email" placeholder="Email">
      <input id="reg-password" type="password" placeholder="Password">
      <button id="register-btn" class="btn">Register</button>
      <p id="reg-error" class="error"></p>
    </div>

    <div class="card">
      <h3>Login</h3>
      <input id="login-email" type="email" placeholder="Email">
      <input id="login-password" type="password" placeholder="Password">
      <button id="login-btn" class="btn">Login</button>
      <p id="login-error" class="error"></p>
    </div>
  </main>

  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
