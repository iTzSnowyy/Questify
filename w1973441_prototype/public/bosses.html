<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Questify - Boss Battle</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <div class="logo logo-flex">
      <img src="assets/logo.png" alt="Questify Logo" class="logo-img">
      <span>Questify</span>
    </div>
    <div id="user-info">
      <span id="user-email"></span>
      <button id="logout-btn" class="btn small">Logout</button>
    </div>
  </header>

  <nav class="nav">
    <a href="index.html">Auth</a>
    <a href="home.html">Home</a>
    <a href="character.html">Character</a>
    <a href="shop.html">Shop</a>
    <a href="workouts.html">Workouts</a>
    <a href="bosses.html">Bosses</a>
    <a href="analytics.html">Analytics</a>
  </nav>

  <main>
    <h2>Boss Battles</h2>

    <div id="boss-list">
      // Bosses will be dynamically added here
    </div>

    <div id="combat-section" class="hidden">
      <div class="combat-container">
        <!-- Player Panel -->
        <div class="combat-panel player-panel">
          <div class="panel-header">You</div>
          <div class="panel-content">
            <div class="center-margin">
              <img id="player-avatar" src="assets/shadow_knight.png" alt="Player Avatar" class="avatar-img">
            </div>
            <div class="hp-section">
              <span id="player-hp">100</span> / <span id="player-max-hp">100</span> HP
              <div class="hp-bar-bg">
                <div id="player-hp-bar" class="hp-bar player-hp full-width-bar"></div>
              </div>
            </div>
            <div class="stats-display">
              <div class="stat">STR: <span id="player-str">14</span> <span class="stat-bonus">(<span id="player-str-bonus">0</span>)</span></div>
              <div class="stat">DEX: <span id="player-dex">9</span> <span class="stat-bonus">(<span id="player-dex-bonus">0</span>)</span></div>
              <div class="stat">INT: <span id="player-int">8</span> <span class="stat-bonus">(<span id="player-int-bonus">0</span>)</span></div>
            </div>
            <div id="player-effects" class="effects"></div>
          </div>
        </div>

        <!-- Boss Panel -->
        <div class="combat-panel boss-panel">
          <div class="panel-header" id="boss-name">Boss</div>
          <div class="panel-content">
            <div class="center-margin">
              <img id="boss-avatar" src="" alt="Boss Avatar" class="avatar-img">
            </div>
            <div class="hp-section">
              <span id="boss-hp">200</span> / <span id="boss-max-hp">200</span> HP
              <div class="hp-bar-bg">
                <div id="boss-hp-bar" class="hp-bar boss-hp full-width-bar"></div>
              </div>
            </div>
            <div id="boss-status" class="boss-status"></div>
            <div id="boss-effects" class="effects"></div>
          </div>
        </div>
      </div>

      <!-- Combat Log -->
      <div class="card combat-log">
        <div id="combat-log" class="combat-log"></div>
      </div>

      <!-- Action Buttons -->
      <div class="combat-actions">
        <button id="attack-btn" class="action-btn btn" data-action="attack">
          <div class="btn-title">Attack</div>
          <div class="btn-desc">STR x 2 (Crit: DEX x 1.5%)</div>
        </button>
        <button id="defend-btn" class="action-btn btn secondary" data-action="defend">
          <div class="btn-title">Defend</div>
          <div class="btn-desc">Reduce next damage by 50%</div>
        </button>
        <button id="flee-btn" class="action-btn btn danger" data-action="flee">
          <div class="btn-title">Flee</div>
          <div class="btn-desc">Attempt to escape</div>
        </button>
      </div>
    </div>
  </main>

  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/rewards.js"></script>
  <script type="module" src="js/combat-system.js"></script>
  <script type="module" src="js/bosses.js"></script>
</body>
</html>
