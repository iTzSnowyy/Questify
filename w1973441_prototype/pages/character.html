<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Questify - Character</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <header class="header">
    <div class="logo" style="display:flex;align-items:center;gap:8px;">
      <img src="../assets/logo.png" alt="Questify Logo" style="height:48px;">
      <span>Questify</span>
    </div>
    <div id="user-info">
      <span id="user-email"></span>
      <button id="logout-btn" class="btn small">Logout</button>
    </div>
  </header>

  <nav class="nav">
    <a href="index.html">Auth</a>
    <a href="home.html">Home</a>
    <a href="character.html">Character</a>
    <a href="shop.html">Shop</a>
    <a href="bosses.html">Bosses</a>
    <a href="analytics.html">Analytics</a>
  </nav>

  <main>
    <div class="card" style="text-align:center;"> 
        <img src="../assets/shadow_avatar (1).png" 
        alt="Character Avatar" 
        style="height:200px;margin-bottom:10px;"> 
    </div>
    <h2>Character</h2>

    <div class="card">
      <p><strong>Level:</strong> <span id="char-level">1</span></p>
      <p><strong>XP:</strong> <span id="char-xp">0</span> / <span id="char-xp-max">100</span></p>
      <div style="background:#020617;border-radius:4px;overflow:hidden;height:12px;margin-top:4px;">
        <div id="xp-bar" style="height:100%;width:0%;background:#22c55e;"></div>
      </div>
      <p><strong>Coins:</strong> <span id="char-coins">0</span></p>
    </div>

    <div class="card">
      <h3>Character Sheet</h3>
      <p>Unspent Points: <span id="char-points">0</span></p>
      <p>Strength: <span id="char-str">5</span></p>
      <p>Dexterity: <span id="char-dex">5</span></p>
      <p>Intelligence: <span id="char-int">5</span></p>
      <p style="font-size: 0.85rem; opacity: 0.8;">(Spending points coming in a later version.)</p>
    </div>
  </main>

  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/ui.js"></script>
  <script type="module" src="../js/rewards.js"></script>
</body>
</html>
